version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: m-motor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mmotor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mmotor123}
      POSTGRES_DB: ${POSTGRES_DB:-mmotor_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mmotor} -d ${POSTGRES_DB:-mmotor_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mmotor-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m-motor-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # Environment
      ENV: ${ENV:-development}
      DEBUG: ${DEBUG:-false}
      
      # Database
      DB_URL: postgresql://${POSTGRES_USER:-mmotor}:${POSTGRES_PASSWORD:-mmotor123}@postgres:5432/${POSTGRES_DB:-mmotor_db}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production-min-32-chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRES_MIN: ${JWT_EXPIRES_MIN:-30}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
      
      # App
      APP_NAME: ${APP_NAME:-M-Motor API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      
      # Upload
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-5}
    volumes:
      - ./app:/app/app:ro
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mmotor-network
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Seeding database...' &&
        python scripts/init_db.py &&
        echo 'Starting application...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

networks:
  mmotor-network:
    driver: bridge
